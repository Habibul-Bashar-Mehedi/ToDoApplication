<header class="app-header" role="banner">
  <!-- App title / logo -->
  <a routerLink="/dashboard" class="app-title" aria-label="Todo App — go to dashboard">
    <svg
      class="app-logo"
      xmlns="http://www.w3.org/2000/svg"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
      aria-hidden="true"
      focusable="false"
      width="24"
      height="24"
    >
      <path d="M9 11l3 3L22 4" />
      <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11" />
    </svg>
    <span class="app-title-text">TodoApp</span>
  </a>

  <!-- Right-side actions -->
  <div class="header-actions">
    <!-- Notification bell -->
    <a
      routerLink="/notifications"
      class="notification-btn"
      aria-label="Notifications"
    >
      <!-- Bell icon -->
      <svg
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        aria-hidden="true"
        focusable="false"
        width="22"
        height="22"
      >
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
        <path d="M13.73 21a2 2 0 0 1-3.46 0" />
      </svg>

      <!--
        Persistent aria-live region so screen readers announce count changes.
        The region must always exist in the DOM; only its content changes.
        When count is 0 the region is empty and the badge is visually hidden.
      -->
      <span
        class="notification-badge-live"
        aria-live="polite"
        aria-atomic="true"
        [attr.aria-label]="notificationService.unreadCount() > 0
          ? notificationService.unreadCount() + ' unread notifications'
          : null"
      >
        @if (notificationService.unreadCount() > 0) {
          <span class="notification-badge" aria-hidden="true">
            {{ notificationService.unreadCount() > 99 ? '99+' : notificationService.unreadCount() }}
          </span>
        }
      </span>
    </a>

    <!-- User menu -->
    @if (authService.isAuthenticated()) {
      <div class="user-menu-wrapper">
        <button
          type="button"
          class="user-menu-trigger"
          [attr.aria-expanded]="userMenuOpen()"
          aria-haspopup="menu"
          aria-label="User menu"
          (click)="toggleUserMenu()"
        >
          <!-- Avatar initials -->
          <span class="user-avatar" aria-hidden="true">
            {{ (authService.currentUser()?.displayName ?? 'U')[0].toUpperCase() }}
          </span>
          <span class="user-name truncate">
            {{ authService.currentUser()?.displayName ?? 'Account' }}
          </span>
          <!-- Chevron -->
          <svg
            class="chevron"
            [class.chevron--open]="userMenuOpen()"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
            focusable="false"
            width="16"
            height="16"
          >
            <polyline points="6 9 12 15 18 9" />
          </svg>
        </button>

        @if (userMenuOpen()) {
          <ul class="user-menu" role="menu" aria-label="User options">
            <li role="none">
              <a
                routerLink="/settings"
                class="user-menu-item"
                role="menuitem"
                (click)="userMenuOpen.set(false)"
              >
                <!-- Settings icon -->
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                  focusable="false"
                  width="16"
                  height="16"
                >
                  <circle cx="12" cy="12" r="3" />
                  <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
                </svg>
                Settings
              </a>
            </li>
            <li role="none" class="user-menu-divider" aria-hidden="true"></li>
            <li role="none">
              <button
                type="button"
                class="user-menu-item user-menu-item--danger"
                role="menuitem"
                (click)="logout()"
              >
                <!-- Logout icon -->
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                  focusable="false"
                  width="16"
                  height="16"
                >
                  <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                  <polyline points="16 17 21 12 16 7" />
                  <line x1="21" y1="12" x2="9" y2="12" />
                </svg>
                Log out
              </button>
            </li>
          </ul>
        }
      </div>
    }
  </div>
</header>
