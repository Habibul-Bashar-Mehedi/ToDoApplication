<!--
  aria-live="polite" ensures screen readers announce new toasts without
  interrupting the user's current activity.
-->
<div
  class="toast-region"
  aria-live="polite"
  aria-atomic="false"
  aria-label="Notifications"
  role="region"
>
  @for (toast of toastService.toasts(); track trackById($index, toast)) {
    <div
      class="toast"
      [class]="'toast--' + toast.type"
      role="alert"
    >
      <!-- Type icon -->
      <svg
        class="toast-icon"
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        [attr.aria-label]="getAriaLabel(toast.type)"
        focusable="false"
        width="18"
        height="18"
      >
        <path [attr.d]="getIconPath(toast.type)" />
      </svg>

      <!-- Message -->
      <p class="toast-message">{{ toast.message }}</p>

      <!-- Dismiss button -->
      <button
        type="button"
        class="toast-dismiss"
        aria-label="Dismiss notification"
        (click)="toastService.dismiss(toast.id)"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
          focusable="false"
          width="16"
          height="16"
        >
          <line x1="18" y1="6" x2="6" y2="18" />
          <line x1="6" y1="6" x2="18" y2="18" />
        </svg>
      </button>
    </div>
  }
</div>
