@if (shouldShow) {
  <!--
    role="alert" + aria-live="assertive" ensures the error is announced
    immediately when it appears, without requiring the user to navigate to it.
    The id must match the aria-describedby on the associated input.
  -->
  <p
    class="field-error"
    [id]="id"
    role="alert"
    aria-live="assertive"
    aria-atomic="true"
  >
    <!-- Error icon — aria-hidden because the text conveys the meaning -->
    <svg
      class="field-error-icon"
      xmlns="http://www.w3.org/2000/svg"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
      aria-hidden="true"
      focusable="false"
      width="14"
      height="14"
    >
      <circle cx="12" cy="12" r="10" />
      <line x1="12" y1="8" x2="12" y2="12" />
      <line x1="12" y1="16" x2="12.01" y2="16" />
    </svg>

    <span>{{ errorMessage }}</span>
  </p>
}
