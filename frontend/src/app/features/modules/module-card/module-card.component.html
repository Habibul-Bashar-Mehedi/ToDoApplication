<article
  class="module-card"
  [attr.aria-label]="'Module: ' + module.name"
>
  <!-- Header: name + visibility badge -->
  <div class="module-card__header">
    <a
      class="module-card__name"
      [routerLink]="['/modules', module.id]"
      [attr.aria-label]="'View module: ' + module.name"
    >
      {{ module.name }}
    </a>

    <span
      class="module-card__visibility"
      [class.module-card__visibility--shared]="module.visibility === 'SHARED'"
      [class.module-card__visibility--private]="module.visibility === 'PRIVATE'"
      [attr.aria-label]="'Visibility: ' + module.visibility"
    >
      <!-- Lock icon for PRIVATE -->
      @if (module.visibility === 'PRIVATE') {
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          width="12"
          height="12"
          aria-hidden="true"
          focusable="false"
        >
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
          <path d="M7 11V7a5 5 0 0 1 10 0v4" />
        </svg>
        Private
      }
      <!-- Users icon for SHARED -->
      @if (module.visibility === 'SHARED') {
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          width="12"
          height="12"
          aria-hidden="true"
          focusable="false"
        >
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
          <circle cx="9" cy="7" r="4" />
          <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
          <path d="M16 3.13a4 4 0 0 1 0 7.75" />
        </svg>
        Shared
      }
    </span>
  </div>

  <!-- Description -->
  @if (module.description) {
    <p class="module-card__description">{{ module.description }}</p>
  }

  <!-- Task count -->
  <div class="module-card__meta">
    <span class="module-card__task-count" aria-label="{{ taskCount }} tasks in this module">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        width="14"
        height="14"
        aria-hidden="true"
        focusable="false"
      >
        <path d="M9 11l3 3L22 4" />
        <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11" />
      </svg>
      {{ taskCount }} {{ taskCount === 1 ? 'task' : 'tasks' }}
    </span>
  </div>

  <!-- Actions -->
  <div class="module-card__actions" role="group" [attr.aria-label]="'Actions for module: ' + module.name">
    <a
      class="btn btn-secondary btn-sm"
      [routerLink]="['/modules', module.id]"
      [attr.aria-label]="'View tasks in module: ' + module.name"
    >
      View tasks
    </a>

    @if (isOwner) {
      <a
        class="btn btn-primary btn-sm"
        [routerLink]="['/modules', module.id, 'share']"
        [attr.aria-label]="'Share module: ' + module.name"
      >
        Share
      </a>

      <button
        type="button"
        class="btn btn-danger btn-sm"
        (click)="onDelete()"
        [attr.aria-label]="'Delete module: ' + module.name"
      >
        Delete
      </button>
    }
  </div>
</article>
