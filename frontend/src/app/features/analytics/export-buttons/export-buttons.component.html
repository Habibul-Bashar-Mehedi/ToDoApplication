<div class="export-buttons" role="group" aria-label="Export analytics data">

  <!-- PDF export -->
  <button
    type="button"
    class="export-btn export-btn--pdf"
    [disabled]="isExportingPdf() || isExportingCsv()"
    (click)="exportPdf()"
    [attr.aria-busy]="isExportingPdf()"
    aria-label="Export analytics as PDF"
  >
    @if (isExportingPdf()) {
      <!-- Spinner -->
      <svg
        class="export-btn__spinner"
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        width="16"
        height="16"
        aria-hidden="true"
        focusable="false"
      >
        <path d="M21 12a9 9 0 1 1-6.219-8.56" />
      </svg>
      <span aria-hidden="true">Exporting…</span>
      <span class="sr-only">Generating PDF export, please wait</span>
    } @else {
      <!-- Download icon -->
      <svg
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        width="16"
        height="16"
        aria-hidden="true"
        focusable="false"
      >
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
        <polyline points="7 10 12 15 17 10" />
        <line x1="12" y1="15" x2="12" y2="3" />
      </svg>
      Export PDF
    }
  </button>

  <!-- CSV export -->
  <button
    type="button"
    class="export-btn export-btn--csv"
    [disabled]="isExportingPdf() || isExportingCsv()"
    (click)="exportCsv()"
    [attr.aria-busy]="isExportingCsv()"
    aria-label="Export analytics as CSV"
  >
    @if (isExportingCsv()) {
      <svg
        class="export-btn__spinner"
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        width="16"
        height="16"
        aria-hidden="true"
        focusable="false"
      >
        <path d="M21 12a9 9 0 1 1-6.219-8.56" />
      </svg>
      <span aria-hidden="true">Exporting…</span>
      <span class="sr-only">Generating CSV export, please wait</span>
    } @else {
      <!-- Table icon -->
      <svg
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        width="16"
        height="16"
        aria-hidden="true"
        focusable="false"
      >
        <rect x="3" y="3" width="18" height="18" rx="2" />
        <line x1="3" y1="9" x2="21" y2="9" />
        <line x1="3" y1="15" x2="21" y2="15" />
        <line x1="9" y1="3" x2="9" y2="21" />
        <line x1="15" y1="3" x2="15" y2="21" />
      </svg>
      Export CSV
    }
  </button>

</div>
