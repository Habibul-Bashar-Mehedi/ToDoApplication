<div class="login-page">
  <div class="login-card">

    <header class="card-header">
      <h1 class="card-title">Sign in to your account</h1>
      <p class="card-subtitle">
        Don't have an account?
        <a routerLink="/register" class="link">Create one</a>
      </p>
    </header>

    <!-- Server error banner — generic, never reveals email existence (req 2.11) -->
    @if (serverError()) {
      <div
        class="error-banner"
        role="alert"
        aria-live="assertive"
        aria-atomic="true"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          width="16"
          height="16"
          aria-hidden="true"
          focusable="false"
        >
          <circle cx="12" cy="12" r="10" />
          <line x1="12" y1="8" x2="12" y2="12" />
          <line x1="12" y1="16" x2="12.01" y2="16" />
        </svg>
        <span>{{ serverError() }}</span>
      </div>
    }

    <form
      [formGroup]="form"
      (ngSubmit)="onSubmit()"
      novalidate
      aria-label="Sign in form"
    >
      <!-- Email -->
      <div class="form-field">
        <label class="form-label" for="email">Email address</label>
        <input
          id="email"
          type="email"
          class="form-input"
          formControlName="email"
          autocomplete="email"
          aria-describedby="email-error"
          [attr.aria-invalid]="
            form.get('email')!.invalid && form.get('email')!.touched
          "
          placeholder="you@example.com"
        />
        <app-field-error
          id="email-error"
          [control]="form.get('email')"
          [messages]="{
            required: 'Email is required',
            email: 'Enter a valid email address'
          }"
        />
      </div>

      <!-- Password -->
      <div class="form-field">
        <div class="password-label-row">
          <label class="form-label" for="password">Password</label>
          <a routerLink="/reset-password" class="link link--small">
            Forgot password?
          </a>
        </div>
        <div class="input-wrapper">
          <input
            id="password"
            [type]="showPassword() ? 'text' : 'password'"
            class="form-input form-input--with-action"
            formControlName="password"
            autocomplete="current-password"
            aria-describedby="password-error"
            [attr.aria-invalid]="
              form.get('password')!.invalid && form.get('password')!.touched
            "
            placeholder="Your password"
          />
          <button
            type="button"
            class="toggle-password"
            (click)="togglePasswordVisibility()"
            [attr.aria-label]="showPassword() ? 'Hide password' : 'Show password'"
            [attr.aria-pressed]="showPassword()"
          >
            <!-- Eye icon (show) -->
            @if (!showPassword()) {
              <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                width="18"
                height="18"
                aria-hidden="true"
                focusable="false"
              >
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            }
            <!-- Eye-off icon (hide) -->
            @if (showPassword()) {
              <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                width="18"
                height="18"
                aria-hidden="true"
                focusable="false"
              >
                <path
                  d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"
                />
                <path
                  d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"
                />
                <line x1="1" y1="1" x2="23" y2="23" />
              </svg>
            }
          </button>
        </div>
        <app-field-error
          id="password-error"
          [control]="form.get('password')"
          [messages]="{
            required: 'Password is required'
          }"
        />
      </div>

      <!-- Remember me -->
      <div class="form-field form-field--checkbox">
        <label class="checkbox-label">
          <input
            id="rememberMe"
            type="checkbox"
            class="checkbox-input"
            formControlName="rememberMe"
          />
          <span>Remember me for 7 days</span>
        </label>
      </div>

      <!-- Submit -->
      <button
        type="submit"
        class="btn btn-primary btn-full"
        [disabled]="isLoading()"
        [attr.aria-busy]="isLoading()"
      >
        @if (isLoading()) {
          <app-loading-spinner size="sm" label="Signing in…" />
          <span>Signing in…</span>
        } @else {
          <span>Sign in</span>
        }
      </button>
    </form>

  </div>
</div>
