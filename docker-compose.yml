services:

  # ── MySQL 8 database ─────────────────────────────────────────────────────────
  todo-db:
    image: mysql:8.0
    container_name: todo-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-todoapp}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - todo-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - todo-network

  # ── Spring Boot API ───────────────────────────────────────────────────────────
  todo-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: todo-api
    restart: unless-stopped
    depends_on:
      todo-db:
        condition: service_healthy
    environment:
      # Database
      DB_HOST: todo-db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-todoapp}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      # JWT
      JWT_SECRET: ${JWT_SECRET}
      # Mail
      MAIL_HOST: ${MAIL_HOST:-localhost}
      MAIL_PORT: ${MAIL_PORT:-25}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      # Spring profile
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
    ports:
      - "${API_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/v1/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - todo-network

  # ── Angular SPA (Nginx) ───────────────────────────────────────────────────────
  todo-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: todo-frontend
    restart: unless-stopped
    depends_on:
      todo-api:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - todo-network

volumes:
  todo-db-data:
    driver: local

networks:
  todo-network:
    driver: bridge
