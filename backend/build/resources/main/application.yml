server:
  port: 8080
  servlet:
    context-path: /api/v1

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:db_ToDoApplication}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=5m

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:25}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

  task:
    scheduling:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        # Expose health (public), info (public), and metrics (admin-only via SecurityConfig)
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-key-at-least-32-characters-long-for-hs256}
    expiration: 1800000
    remember-me-expiration: 604800000
  mail:
    # Set to true only when a real SMTP server is configured (production).
    # When false: emails are logged to console and new users are auto-verified.
    enabled: ${MAIL_ENABLED:false}

logging:
  level:
    root: INFO
    com.todoapp: DEBUG

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    # Disable the "Try it out" default expansion to reduce noise
    operations-sorter: alpha
  # Include actuator endpoints in the OpenAPI spec
  show-actuator: false

