# ─────────────────────────────────────────────────────────────────────────────
# Development profile — for running locally in IntelliJ or via ./gradlew bootRun
#
# Usage in IntelliJ:
#   Run/Debug Configuration → Environment variables:
#     SPRING_PROFILES_ACTIVE=dev
#   Or add to VM options: -Dspring.profiles.active=dev
#
# Requires a local MySQL instance. Quick start with Docker:
#   docker run -d --name todo-db \
#     -e MYSQL_ROOT_PASSWORD=root \
#     -e MYSQL_DATABASE=todoapp \
#     -e MYSQL_USER=todoapp_user \
#     -e MYSQL_PASSWORD=todoapp_pass \
#     -p 3306:3306 mysql:8.0
# ─────────────────────────────────────────────────────────────────────────────

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/db_ToDoApplication?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:password}

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  mail:
    host: localhost
    port: 1025
    username: ""
    password: ""
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

# Disable real email sending in dev — EmailService logs the link instead
app:
  mail:
    enabled: false

app:
  jwt:
    secret: ${JWT_SECRET:75245a30c07c749b235d767852843d7cf619107909c087a5e131f26e9ac9771d}

# Show full Swagger UI in dev
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

management:
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.todoapp: DEBUG
    org.springframework.security: DEBUG
