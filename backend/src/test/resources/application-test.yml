spring:
  datasource:
    url: jdbc:tc:mysql:8.0:///todoapp_test?TC_REUSABLE=true
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    username: test
    password: test

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  mail:
    host: localhost
    port: 3025
    username: ''
    password: ''
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

app:
  jwt:
    secret: test-secret-key-for-testing-only-minimum-256-bits-long-padding-here
    expiration: 1800000
    remember-me-expiration: 604800000

logging:
  level:
    root: WARN
    com.todoapp: DEBUG
